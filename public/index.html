<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="container">
        <div class="name">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTuLvcLlcFGyO07wSM7FoyPmGc-s6TGwpkqIzQkSw0HfQ&s=10">
            <h2>Hospital Management System</h2>
        </div>
        <div class="dashboard-grid">
            <div class="form-container">
                <h3>Register Patient</h3>
                <form id="patientForm">
                    <label>Name</label>
                    <input type="text" id="name" placeholder="Patient Name" required>
                    <label>Age</label>
                    <input type="number" id="age" placeholder="Age" required>
                    <label>Disease</label>
                    <input type="text" id="disease" placeholder="Disease" required>
                    <button type="submit" id="submit">Add Patient</button>
                </form>
            </div>
            <div class="list-container">
                <h3>Patient Records</h3>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th class="border">ID</th>
                                <th>Name</th>
                                <th>Age</th>
                                <th>Disease</th>
                                <th>Date</th>
                                <th class="border_1">Action</th>
                            </tr>
                        </thead>
                        <tbody id="patientTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
